version: "3.8"

services:
  # PHP Application Server
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: studio-crm-app
    container_name: studio-crm-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - studio-crm-network

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: studio-crm-web
    restart: unless-stopped
    tty: true
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - studio-crm-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: studio-crm-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: studio_crm
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - studio-crm-db-data:/var/lib/mysql
    networks:
      - studio-crm-network

networks:
  studio-crm-network:
    driver: bridge

volumes:
  studio-crm-db-data:
    driver: local
