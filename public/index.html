    <!-- Tool Tabs -->
    <div class="tool-tabs" style="display:flex !important;background:#1a1a1a;border-bottom:2px solid #333;position:relative;z-index:999999;">
        <button class="tool-tab active" data-tab="tool" style="flex:1;padding:1rem;background:#3B82F6;color:#fff;border:none;cursor:pointer;font-size:1rem;font-weight:600;">🧮 Tool</button>
        <button class="tool-tab" data-tab="docs" style="flex:1;padding:1rem;background:#222;color:#ccc;border:none;cursor:pointer;font-size:1rem;font-weight:600;">📖 Documentation</button>
        <button class="tool-tab" data-tab="embed" style="flex:1;padding:1rem;background:#222;color:#ccc;border:none;cursor:pointer;font-size:1rem;font-weight:600;">⚡ Embed Code</button>
    </div>

    <!-- Tab Content: Tool -->
    <div id="tab-tool" class="wrapper-tab-content">
        <div id="app"></div>
    </div>

    <!-- Tab Content: Documentation -->
    <div id="tab-docs" class="wrapper-tab-content" style="display:none;padding:2rem 1rem;">
        <iframe src="./documentation.html" style="width:100%;min-height:800px;border:none;background:#0f0f0f;"></iframe>
    </div>

    <!-- Tab Content: Embed -->
    <div id="tab-embed" class="wrapper-tab-content" style="display:none;padding:2rem;text-align:center;">
        <div style="background:#1a1a1a;padding:2rem;border-radius:8px;max-width:600px;margin:0 auto;">
            <h2 style="color:#3B82F6;margin-bottom:1rem;">Embed This Tool</h2>
            <p style="color:#ccc;margin-bottom:1rem;">Copy the code below to embed this tool on your website:</p>
            <textarea id="embedCodeTab" style="width:100%;height:120px;background:#0f0f0f;color:#10B981;border:1px solid #333;border-radius:4px;padding:1rem;font-family:monospace;font-size:0.9rem;" readonly>&lt;iframe src="https://poliinternational.com/tools/studio-crm/index.html" width="100%" height="1000" frameborder="0" style="border-radius:12px;"&gt;&lt;/iframe&gt;</textarea>
            <button onclick="copyEmbedCode()" style="margin-top:1rem;padding:0.75rem 1.5rem;background:#3B82F6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;">📋 Copy Code</button>
        </div>
    </div>

<script>
if (window.self !== window.top) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.body.classList.add('dark-mode');
    window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'poli-theme') {
            if (e.data.light) {
                document.body.classList.remove('dark-mode');
                document.body.classList.add('light-mode');
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.body.classList.remove('light-mode');
                document.body.classList.add('dark-mode');
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        }
    });
}
</script>

<script>
    // Tool Tabs Functionality
    document.querySelectorAll('.tool-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tool-tab').forEach(t => {
                t.style.background = '#222';
                t.style.color = '#ccc';
            });
            tab.style.background = '#3B82F6';
            tab.style.color = '#fff';
            const tabName = tab.dataset.tab;
            document.querySelectorAll('.wrapper-tab-content').forEach(content => {
                content.style.display = 'none';
            });
            document.getElementById('tab-' + tabName).style.display = 'block';
        });
    });

    function copyEmbedCode() {
        const textarea = document.getElementById('embedCodeTab');
        textarea.select();
        document.execCommand('copy');
        alert('Copied to clipboard!');
    }
</script>
